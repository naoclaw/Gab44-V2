name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'frontend/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.PREVIEW_BACKEND_URL || 'http://localhost:8001' }}
          REACT_APP_ONESIGNAL_APP_ID: ${{ secrets.REACT_APP_ONESIGNAL_APP_ID || '' }}
          PUBLIC_URL: /Gab44-V2/pr-${{ github.event.pull_request.number }}
          CI: false
        run: yarn build

      - name: Deploy preview to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: frontend/build
          target-folder: pr-${{ github.event.pull_request.number }}
          clean: false

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const repo = context.repo;
            const previewUrl = `https://${repo.owner}.github.io/${repo.repo}/pr-${pr}/`;

            // Find existing preview comment
            const comments = await github.rest.issues.listComments({
              ...repo,
              issue_number: pr,
            });
            const botComment = comments.data.find(
              c => c.user.type === 'Bot' && c.body.includes('🔍 Preview Deployment')
            );

            const body = `## 🔍 Preview Deployment\n\nYour changes have been built and deployed to a preview environment.\n\n**Preview URL:** ${previewUrl}\n\n> ⏳ It may take a minute for the deployment to become available.\n> This preview will be removed when the PR is closed.`;

            if (botComment) {
              await github.rest.issues.updateComment({
                ...repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...repo,
                issue_number: pr,
                body,
              });
            }
