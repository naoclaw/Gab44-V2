name: Preview Cleanup

on:
  pull_request:
    types: [closed]
    paths:
      - 'frontend/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove PR preview folder
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          if [ -d "pr-${PR_NUMBER}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "pr-${PR_NUMBER}"
            git commit -m "chore: remove preview for PR #${PR_NUMBER}"
            git push
          else
            echo "Preview folder pr-${PR_NUMBER} not found, nothing to clean up."
          fi

      - name: Update PR comment on close
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const repo = context.repo;

            const comments = await github.rest.issues.listComments({
              ...repo,
              issue_number: pr,
            });
            const botComment = comments.data.find(
              c => c.user.type === 'Bot' && c.body.includes('🔍 Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                ...repo,
                comment_id: botComment.id,
                body: `## 🔍 Preview Deployment\n\nThis PR has been closed and the preview deployment has been removed.`,
              });
            }
